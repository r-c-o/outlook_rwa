# Shared base config — tracked in git. Keep machine-specific values OUT of here.
#
# For your machine, create `config.local.toml` next to this file (it is
# git-ignored) and set only the keys you want to override — e.g. your paths and
# Q0. It is deep-merged over this file at load time, so your local settings never
# conflict on `git pull`. See `load_config` in src/outlook_rwa/functions.py.

[parameters]
# Starting quarter of the projection horizon — "Month YYYY" format
Q0 = "Mar 2025"
export_intermediate_xlsx = "False"

[paths]
# Absolute paths are machine-specific — override these in config.local.toml.
data_dir = "/absolute/path/to/outlook_rwa/data"
schema_registry_csv = "/absolute/path/to/outlook_rwa/src/outlook_rwa/schema_registry.csv"
data_dir_backup = "/absolute/path/to/backup/outlook-rwa-data"
schema_registry_csv_backup = "/absolute/path/to/backup/src/outlook_rwa/schema_registry.csv"

[outputs]
step1_dir = "/absolute/path/to/outlook_rwa/data/output/step1"
step1_dir_backup = "/absolute/path/to/backup/output/step1"
step2_dir = "/absolute/path/to/outlook_rwa/data/output/step2"
step2_dir_backup = "/absolute/path/to/backup/output/step2"

[[outputs.step1]]
cg_outlook = "cg_outlook.xlsx"
cbna_outlook = "cbna_outlook.xlsx"
cg_addon_non_waterfall_rwa = "addon_all_cg.xlsx"
cbna_addon_non_waterfall_rwa = "addon_all_cbna.xlsx"
